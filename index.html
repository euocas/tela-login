<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <button id="theme-toggle" onclick="toggleTheme()" style="position:absolute;top:1rem;right:1rem;z-index:10;background:none;border:none;font-size:2rem;cursor:pointer" aria-label="Alternar tema"></button>
        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfis disponíveis">
            <nav class="profiles">
                <ul>
                    <li>
                        <a href="#" class="profile">
                            <figure>
                                <img src="/assets/perfil-1.jpg" alt="Um personagem com estetica cyberpunk fazendo sinal de silêncio com o dedo indicador na boca">
                                <figcaption>Perfil1</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="profile">
                            <figure>
                                <img src="/assets/perfil-2.jpg" alt="Um personagem futurista com uma maquina fotografica e estetica cyberpunk">
                                <figcaption>Perfil2</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="profile">
                            <figure>
                                <img src="/assets/perfil-3.jpg" alt="Um personagem com estetica cyberpunk segurando o capuz.">
                                <figcaption>Perfil3</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="profile">
                            <figure>
                                <img src="/assets/perfil-4.jpg" alt="Um personagem com estetica cyberpunk com capuz na cabeça e um sorriso sinistro no rosto.">
                                <figcaption>Perfil4</figcaption>
                            </figure>
                        </a>
                    </li>
                </ul>
            </nav>
        </section>
    </main>
    <script src="theme.js"></script>
</body>
</html>
